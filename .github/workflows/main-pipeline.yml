name: Main Branch Pipeline

on:
  push:
    branches: [main]

jobs:
  # Code Quality
  code_quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install dependencies
        run: npm install
      - name: Check style
        run: npm run eslint

  # Unit Tests
  unit_tests:
    runs-on: ubuntu-latest
    needs: [code_quality]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install dependencies
        run: npm install
      - name: Run Jest tests
        run: npm test

  # E2E Tests
  e2e_tests:
    runs-on: ubuntu-latest
    needs: [code_quality]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install dependencies
        run: npm install
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run e2e tests
        run: npm run test:e2e
        env:
          CI: true

  # Build
  build:
    runs-on: ubuntu-latest
    needs: [code_quality]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install dependencies
        run: npm install
      - name: Build application
        run: npm run build

  # Deploy (only if no #skip)
  deploy:
    runs-on: ubuntu-latest
    needs: [unit_tests, e2e_tests, build]
    if: success() && !contains(join(github.event.commits.*.message, ' '), '#skip')
    steps:
      - uses: actions/checkout@v4
      - name: Trigger Render deployment
        run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}

  # Tag Release (only if no #skip and deploy succeeded)
  tag_release:
    runs-on: ubuntu-latest
    needs: [deploy]
    if: success()
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Bump version and push tag
        uses: anothrNick/github-tag-action@4ed44965e0db8dab2b466a16da04aec3cc312fd8
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEFAULT_BUMP: patch
          WITH_V: true
          DRY_RUN: false