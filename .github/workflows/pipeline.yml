name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test_build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci

      # ESLint (does NOT fail pipeline)
      - name: Lint code
        run: npm run eslint || true

      # Unit tests
      - name: Run Jest tests
        run: npm test

      # Install Playwright browsers
      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      # E2E tests
      - name: Run Playwright tests
        run: npm run test:e2e
        env:
          CI: true

      # Build app
      - name: Build application
        run: npm run build

  deploy:
    needs: test_build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Echo deploy step (replace with real deploy if needed)
        run: echo "Deploy step successful"